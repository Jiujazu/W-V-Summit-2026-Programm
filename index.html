/*
 * Retro Theme
 * Inspiriert von: NASA Graphics Standards Manual (1976), 70s Brand Identity,
 * 80s Synthwave Neon und klassischen Corporate Design Manuals.
 * Quellen:

 *   https://brandingstyleguides.com/
 */
[data-theme="retro"] {
  --bg: #1a1028;
  --card: rgba(255,180,60,0.06);
  --card-break: rgba(255,180,60,0.03);
  --accent: #ff6b35;
  --teal: #00e5c6;
  --gold: #ffb43c;
  --text: #f0e6d2;
  --text-dim: rgba(240,230,210,0.55);
  --text-faint: rgba(240,230,210,0.15);
  --border: rgba(255,180,60,0.12);
  --search-bg: rgba(255,180,60,0.08);
  --search-border: rgba(255,180,60,0.15);
  --search-placeholder: rgba(240,230,210,0.3);
  --search-clear-bg: rgba(255,107,53,0.2);
  --search-clear-color: rgba(240,230,210,0.5);
  --tab-bg: rgba(255,180,60,0.08);
  --tab-color: rgba(240,230,210,0.5);
  --pill-bg: rgba(255,180,60,0.06);
  --pill-color: rgba(240,230,210,0.4);
  --pill-active-bg: rgba(255,107,53,0.25);
  --pill-active-color: #f0e6d2;
  --badge-main-bg: rgba(255,107,53,0.2);
  --badge-deep-bg: rgba(0,229,198,0.15);
  --badge-break-bg: rgba(255,180,60,0.08);
  --badge-break-color: rgba(240,230,210,0.4);
  --share-color: rgba(240,230,210,0.2);
  --room-color: rgba(255,180,60,0.5);
  --speakers-color: rgba(240,230,210,0.5);
  --desc-color: rgba(240,230,210,0.65);
  --expand-color: rgba(255,180,60,0.25);
  --footer-color: rgba(240,230,210,0.2);
  --footer-primary: rgba(255,180,60,0.5);
  --footer-secondary: rgba(240,230,210,0.25);
  --current-bg: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(213,84,213,0.08));
  --current-border: rgba(255,107,53,0.4);
  --next-border: rgba(255,180,60,0.3);
  --fav-active-bg: rgba(255,180,60,0.2);
  --time-color: rgba(255,180,60,0.6);
  --toggle-bg: rgba(255,180,60,0.1);
  /* Retro-specific overrides */
  --retro-glow: 0 0 20px rgba(255,107,53,0.15);
  --retro-font: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* Retro visual overrides */
[data-theme="retro"] body { font-family: var(--retro-font); letter-spacing: 0.3px; }
[data-theme="retro"] .header-label { letter-spacing: 4px; text-shadow: 0 0 12px rgba(255,107,53,0.4); }
[data-theme="retro"] .header-title { text-shadow: 0 0 8px rgba(255,180,60,0.3); }
[data-theme="retro"] .header-subtitle { color: #d554d5; font-style: normal; font-weight: 500; text-shadow: 0 0 8px rgba(213,84,213,0.4); }
[data-theme="retro"] .session { border-radius: 4px; border: 1px solid rgba(255,180,60,0.1); }
[data-theme="retro"] .session.is-current { box-shadow: var(--retro-glow); }
[data-theme="retro"] .badge { border-radius: 2px; letter-spacing: 1.5px; }
[data-theme="retro"] .badge-now { background: linear-gradient(90deg, #ff6b35, #d554d5); text-shadow: 0 0 6px rgba(255,255,255,0.3); animation: neonFlicker 3s ease-in-out infinite; }
[data-theme="retro"] .badge-next { background: rgba(255,180,60,0.2); }
[data-theme="retro"] .day-tab { border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
[data-theme="retro"] .day-tab.active { background: linear-gradient(135deg, #ff6b35, #d554d5); }
[data-theme="retro"] .filter-pill { border-radius: 2px; text-transform: uppercase; letter-spacing: 0.8px; }
[data-theme="retro"] .search-input { border-radius: 2px; }
[data-theme="retro"] .time-label { font-variant-numeric: tabular-nums; letter-spacing: 1px; }
[data-theme="retro"] .time-line { background: linear-gradient(90deg, rgba(255,180,60,0.2), transparent); }
[data-theme="retro"] .footer-disclaimer { color: #d554d5; opacity: 0.7; }

/* Synthwave Animations */
@keyframes neonFlicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.6; }
  94% { opacity: 1; }
  96% { opacity: 0.4; }
  97% { opacity: 1; }
}
@keyframes retroGlow {
  0%, 100% { text-shadow: 0 0 8px rgba(255,107,53,0.4), 0 0 20px rgba(255,107,53,0.2); }
  50% { text-shadow: 0 0 12px rgba(255,107,53,0.6), 0 0 30px rgba(213,84,213,0.3), 0 0 50px rgba(255,107,53,0.1); }
}
@keyframes scanlineMove {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
@keyframes gridScroll {
  0% { background-position: 0 0; }
  100% { background-position: 0 40px; }
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}
@keyframes synthPulse {
  0%, 100% { box-shadow: 0 0 5px rgba(255,107,53,0.2); }
  50% { box-shadow: 0 0 15px rgba(213,84,213,0.3), 0 0 30px rgba(255,107,53,0.15); }
}
@keyframes vhsGlitch {
  0%, 95%, 100% { transform: translateX(0); opacity: 0; }
  96% { transform: translateX(-5px); opacity: 0.8; }
  97% { transform: translateX(10px); opacity: 0.6; }
  98% { transform: translateX(-3px); opacity: 0.7; }
  99% { transform: translateX(7px); opacity: 0; }
}
@keyframes crtFlicker {
  0%, 100% { opacity: 1; }
  50.1% { opacity: 0.98; }
  50.2% { opacity: 1; }
  75.1% { opacity: 0.97; }
  75.3% { opacity: 1; }
}

/* Retro scanline overlay */
[data-theme="retro"] .retro-scanlines {
  display: block;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9998;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.03) 0px,
    rgba(0,0,0,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
}
.retro-scanlines { display: none; }

/* Retro grid background */
[data-theme="retro"] .retro-grid {
  display: block;
  position: fixed; bottom: 0; left: 0; width: 100%; height: 35vh;
  pointer-events: none; z-index: -1;
  background:
    linear-gradient(rgba(26,16,40,0) 0%, rgba(26,16,40,0.6) 100%),
    linear-gradient(90deg, rgba(255,107,53,0.07) 1px, transparent 1px),
    linear-gradient(rgba(213,84,213,0.05) 1px, transparent 1px);
  background-size: 100% 100%, 40px 40px, 40px 40px;
  animation: gridScroll 4s linear infinite;
  mask-image: linear-gradient(transparent 0%, rgba(0,0,0,0.5) 100%);
  -webkit-mask-image: linear-gradient(transparent 0%, rgba(0,0,0,0.5) 100%);
}
.retro-grid { display: none; }

/* Retro sun */
[data-theme="retro"] .retro-sun {
  display: block;
  position: fixed; bottom: 34vh; left: 50%; transform: translateX(-50%);
  width: 120px; height: 60px;
  border-radius: 120px 120px 0 0;
  background: linear-gradient(180deg, #ff6b35 0%, #d554d5 50%, #7b2fbe 100%);
  opacity: 0.25; pointer-events: none; z-index: -1;
  box-shadow: 0 0 60px rgba(255,107,53,0.3), 0 0 120px rgba(213,84,213,0.15);
  /* Horizontal line cutouts */
  mask-image: repeating-linear-gradient(
    180deg,
    rgba(0,0,0,1) 0px, rgba(0,0,0,1) 6px,
    transparent 6px, transparent 10px
  );
  -webkit-mask-image: repeating-linear-gradient(
    180deg,
    rgba(0,0,0,1) 0px, rgba(0,0,0,1) 6px,
    transparent 6px, transparent 10px
  );
}
.retro-sun { display: none; }

/* Retro stars canvas */
[data-theme="retro"] .retro-stars {
  display: block;
  position: fixed; top: 0; left: 0; width: 100%; height: 65vh;
  pointer-events: none; z-index: -1;
}
.retro-stars { display: none; }

/* Neon glow on retro header */
[data-theme="retro"] .header-label { animation: retroGlow 4s ease-in-out infinite; }
[data-theme="retro"] .header-title { animation: retroGlow 4s ease-in-out infinite 1s; }

/* Retro session card hover glow */
[data-theme="retro"] .session { transition: box-shadow 0.3s ease, border-color 0.3s ease; }
[data-theme="retro"] .session:active { box-shadow: 0 0 20px rgba(213,84,213,0.2), 0 0 40px rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); }

/* Retro active tab neon */
[data-theme="retro"] .day-tab.active { box-shadow: 0 0 12px rgba(255,107,53,0.3), 0 0 24px rgba(213,84,213,0.15); animation: synthPulse 3s ease-in-out infinite; }
[data-theme="retro"] .filter-pill.active { box-shadow: 0 0 8px rgba(255,107,53,0.2); }

/* Music toggle */
.music-toggle {
  background: var(--toggle-bg); border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  font-size: 16px; line-height: 1; transition: all .3s;
  flex-shrink: 0; position: relative;
}
.music-toggle:active { transform: scale(0.92); }
.music-toggle.playing { box-shadow: 0 0 12px rgba(213,84,213,0.4); }
[data-theme="retro"] .music-toggle { display: flex; }

/* CRT vignette effect */
[data-theme="retro"] .retro-vignette {
  display: block;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9997;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
}
.retro-vignette { display: none; }

/* VHS glitch line */
[data-theme="retro"] .vhs-glitch {
  display: block;
  position: fixed; left: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4) 20%, rgba(213,84,213,0.3) 50%, rgba(255,107,53,0.3) 80%, transparent);
  pointer-events: none; z-index: 9996;
  will-change: transform, opacity;
}
.vhs-glitch { display: none; }
.vhs-glitch:nth-child(1) { top: 30%; animation: vhsGlitch 8s linear infinite; }
.vhs-glitch:nth-child(2) { top: 65%; animation: vhsGlitch 11s linear infinite 3s; }

/* Nyan Cat (small, retro only, easter-egg only) */
@keyframes nyanFly {
  0% { transform: translateX(-80px) translateY(0); }
  25% { transform: translateX(25vw) translateY(-10px); }
  50% { transform: translateX(50vw) translateY(5px); }
  75% { transform: translateX(75vw) translateY(-8px); }
  100% { transform: translateX(calc(100vw + 80px)) translateY(0); }
}
.nyan-cat-wrap { display: none; }
.easter-active[data-theme="retro"] .nyan-cat-wrap {
  display: block;
  position: fixed; top: 12vh; left: 0; width: 100%; height: 50px;
  pointer-events: none; z-index: 50; overflow: hidden;
}
.nyan-cat-img {
  position: absolute; top: 0; left: -80px;
  width: 40px; height: auto;
  image-rendering: pixelated;
  animation: nyanFly 12s linear infinite;
  will-change: transform;
  font-size: 0; color: transparent; /* hide alt text if image fails */
}

/* Retro cards — subtle glow, NO rainbow border animation (performance) */
[data-theme="retro"] .session { border-color: rgba(255,180,60,0.15); }
[data-theme="retro"] .session.is-current { animation: synthPulse 3s ease-in-out infinite; }

/* CRT screen flicker — subtle, long interval */
[data-theme="retro"] body { animation: crtFlicker 4s infinite; }

/* Easter egg mode (shake or Konami) */
[data-theme="retro"].easter-active .retro-scanlines { background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px); }
.easter-active .session { transition: all 0.3s; }
.easter-active .session:hover, .easter-active .session:active { transform: scale(1.02) rotate(0.5deg); }
.easter-active .nyan-cat-img { width: 70px; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 520px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
}
::-webkit-scrollbar { display: none; }
body { scrollbar-width: none; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Search */
.search-wrap {
  position: relative; margin-top: 6px;
  display: none;
}
.search-wrap.is-open { display: block; }
.search-toggle {
  background: var(--toggle-bg); border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1; transition: background .15s;
  flex-shrink: 0;
}
.search-toggle:active { transform: scale(0.92); }
.search-toggle.is-active { background: var(--pill-active-bg); }
.search-input {
  width: 100%; padding: 9px 36px 9px 14px;
  background: var(--search-bg); border: 1px solid var(--search-border);
  border-radius: 10px; color: var(--text); font-family: inherit; font-size: 13px;
  outline: none; transition: border-color .15s;
}
.search-input::placeholder { color: var(--search-placeholder); }
.search-input:focus { border-color: var(--text-dim); }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: var(--search-clear-bg); border: none; color: var(--search-clear-color);
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  font-size: 11px; display: flex; align-items: center; justify-content: center;
}

/* Toast notification */
.share-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--teal); color: #000; padding: 8px 18px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
  z-index: 99999; animation: fadeIn .2s ease;
  pointer-events: none;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg) 92%, transparent);
  padding: calc(var(--safe-top) + 10px) 16px 8px;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.header-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
.header-title { font-size: 16px; font-weight: 800; line-height: 1.2; }
.header-meta { font-size: 10px; color: var(--text-dim); text-align: right; line-height: 1.4; }
.header-subtitle { font-size: 11px; color: var(--text-dim); font-weight: 300; margin-top: 1px; font-style: italic; }
.footer-disclaimer { font-size: 9px; opacity: 0.5; margin-top: 2px; display: inline-block; }

/* Day Tabs */
.day-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
.day-tab {
  flex: 1; padding: 8px 0; border: none; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  background: var(--tab-bg); color: var(--tab-color);
  transition: all .2s;
}
.day-tab.active { background: var(--accent); color: #fff; }

/* Filter row: scrollable pills + fixed fav button */
.filter-row { display: flex; gap: 6px; align-items: center; }
.filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 2px; flex: 1; min-width: 0; }
.filters::-webkit-scrollbar { display: none; }
.filter-pill {
  padding: 8px 14px; border: none; border-radius: 20px; cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 600;
  background: var(--pill-bg); color: var(--pill-color);

function timeToMin(t) { const p = t.split(":"); return parseInt(p[0],10)*60+parseInt(p[1],10); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Parse "Name (Role | Company)" or "Mod: Name (Outlet)" format
function parseSpeaker(raw) {
  var str = raw;
  var isMod = false;
  if (str.indexOf("Mod:") === 0) { isMod = true; str = str.substring(4).trim(); }
  if (str.indexOf("Begrüßung:") === 0) { str = str.substring(10).trim(); }
  var name = str, role = "", company = "";
  var paren = str.indexOf("(");
  if (paren > -1) {
    name = str.substring(0, paren).trim();
    var inner = str.substring(paren + 1, str.lastIndexOf(")"));
    var parts = inner.split("|");
    if (parts.length >= 2) {
      role = parts[0].trim();
      company = parts.slice(1).join("|").trim();
    } else {
      // No pipe — might be just a company or role
      company = parts[0].trim();
    }
  }
  return { name: name, role: role, company: company, isMod: isMod, raw: raw };
}

function formatSpeakerHtml(raw, compact) {
  var p = parseSpeaker(raw);
  var h = '';
  if (p.isMod) h += '<span class="speaker-role">Mod: </span>';
  h += '<span class="speaker-name">' + esc(p.name) + '</span>';
  // In compact mode (many speakers): only show company, skip role
  if (compact) {
    if (p.company) h += ' <span class="speaker-company">' + esc(p.company) + '</span>';
  } else {
    if (p.role) h += ' <span class="speaker-role">' + esc(p.role) + '</span>';
    if (p.company) h += ' <span class="speaker-company">' + esc(p.company) + '</span>';
  }
  return h;
}

// Build people & company indexes
var peopleIndex = [];
var companyIndex = {};
(function buildIndexes() {
  var peopleMap = {};
  for (var i = 0; i < S.length; i++) {
    var s = S[i];
    for (var j = 0; j < s.speakers.length; j++) {
      var p = parseSpeaker(s.speakers[j]);
      if (!p.name) continue;
      // People
      if (!peopleMap[p.name]) {
        peopleMap[p.name] = { name: p.name, role: p.role, company: p.company, sessions: [] };
      }
      peopleMap[p.name].sessions.push(s.id);
      // Companies
      if (p.company) {
        // Handle multiple companies separated by commas or slashes
        var companies = p.company.split(/[\/,]/).map(function(c) { return c.trim(); }).filter(Boolean);
        for (var ci = 0; ci < companies.length; ci++) {
          var co = companies[ci];
          if (!companyIndex[co]) companyIndex[co] = { name: co, sessions: new Set() };
          companyIndex[co].sessions.add(s.id);
        }
      }
    }
  }
  // Sort people alphabetically
  peopleIndex = Object.values(peopleMap).sort(function(a, b) { return a.name.localeCompare(b.name, 'de'); });
  // Convert company sets to arrays
  Object.keys(companyIndex).forEach(function(k) { companyIndex[k].sessions = Array.from(companyIndex[k].sessions); });
})();

var directoryMode = "people"; // "people" or "companies"
var directoryFilterText = "";

function openDirectory(mode) {
  directoryMode = mode || "people";
  directoryFilterText = "";
  document.getElementById("directorySearch").value = "";
  document.getElementById("dirTabPeople").classList.toggle("active", directoryMode === "people");
  document.getElementById("dirTabCompanies").classList.toggle("active", directoryMode === "companies");
  document.getElementById("directoryTitle").textContent = directoryMode === "people" ? "Speaker" : "Firmen";
  renderDirectory();
  document.getElementById("directoryOverlay").classList.add("is-open");
  document.body.style.overflow = "hidden";
}

function closeDirectory() {
  document.getElementById("directoryOverlay").classList.remove("is-open");
  document.body.style.overflow = "";
}

function switchDirectoryTab(mode) {
  directoryMode = mode;
  directoryFilterText = "";
  document.getElementById("directorySearch").value = "";
  document.getElementById("dirTabPeople").classList.toggle("active", mode === "people");
  document.getElementById("dirTabCompanies").classList.toggle("active", mode === "companies");
  document.getElementById("directoryTitle").textContent = mode === "people" ? "Speaker" : "Firmen";
  renderDirectory();
}

function filterDirectory(val) {
  directoryFilterText = val.trim().toLowerCase();
  renderDirectory();
}

function renderDirectory() {
  var list = document.getElementById("directoryList");
  var html = '';
  var lastLetter = '';

  if (directoryMode === "people") {
    var filtered = peopleIndex.filter(function(p) {
      if (!directoryFilterText) return true;
      return (p.name + " " + p.company).toLowerCase().indexOf(directoryFilterText) > -1;
    });
    for (var i = 0; i < filtered.length; i++) {
      var p = filtered[i];
      var letter = p.name.charAt(0).toUpperCase();
      if (letter !== lastLetter) {
        html += '<div class="directory-letter">' + esc(letter) + '</div>';
        lastLetter = letter;
      }
      var initials = p.name.split(" ").map(function(w) { return w.charAt(0); }).join("").substring(0, 2);
      html += '<div class="directory-item" data-dir-type="person" data-dir-value="' + esc(p.name) + '">';
      html += '<div class="directory-item-icon">' + esc(initials) + '</div>';
      html += '<div class="directory-item-info"><div class="directory-item-name">' + esc(p.name) + '</div>';
      if (p.company) html += '<div class="directory-item-meta">' + esc(p.role ? p.role + " · " : "") + esc(p.company) + '</div>';
      html += '</div>';
      html += '<div class="directory-item-count">' + p.sessions.length + '</div>';
      html += '</div>';
    }
    if (!filtered.length) html = '<div class="empty">Keine Speaker gefunden</div>';
  } else {
    var companies = Object.values(companyIndex).sort(function(a, b) { return a.name.localeCompare(b.name, 'de'); });
    var filtered2 = companies.filter(function(c) {
      if (!directoryFilterText) return true;
      return c.name.toLowerCase().indexOf(directoryFilterText) > -1;
    });
    for (var j = 0; j < filtered2.length; j++) {
      var c = filtered2[j];
      var letter2 = c.name.charAt(0).toUpperCase();
      if (letter2 !== lastLetter) {
        html += '<div class="directory-letter">' + esc(letter2) + '</div>';
        lastLetter = letter2;
      }
      html += '<div class="directory-item" data-dir-type="company" data-dir-value="' + esc(c.name) + '">';
      html += '<div class="directory-item-icon">🏢</div>';
      html += '<div class="directory-item-info"><div class="directory-item-name">' + esc(c.name) + '</div>';
      html += '<div class="directory-item-meta">' + c.sessions.length + ' Session' + (c.sessions.length > 1 ? 's' : '') + '</div>';
      html += '</div>';
      html += '<div class="directory-item-count">' + c.sessions.length + '</div>';
      html += '</div>';
    }
    if (!filtered2.length) html = '<div class="empty">Keine Firmen gefunden</div>';
  }

  list.innerHTML = html;
}

// Event delegation for directory item clicks (safe: no inline onclick)
document.getElementById("directoryList").addEventListener("click", function(e) {
  var item = e.target.closest(".directory-item");
  if (!item) return;
  var type = item.dataset.dirType;
  var value = item.dataset.dirValue;
  if (type && value) selectDirectoryItem(type, value);
});

function selectDirectoryItem(type, value) {
  closeDirectory();
  // Check which day has results for this search
  var hay1 = 0, hay2 = 0;
  var q = value.toLowerCase();
  for (var i = 0; i < S.length; i++) {
    var h = (S[i].title + " " + S[i].speakers.join(" ") + " " + S[i].room + " " + S[i].desc).toLowerCase();
    if (h.indexOf(q) > -1) { if (S[i].day === 1) hay1++; if (S[i].day === 2) hay2++; }
  }
  // Switch to the day with results if current day has none
  if (currentDay === 1 && hay1 === 0 && hay2 > 0) setDay(2);
  else if (currentDay === 2 && hay2 === 0 && hay1 > 0) setDay(1);
  // Open search and filter
  document.getElementById("searchWrap").classList.add("is-open");
  document.getElementById("searchToggle").classList.add("is-active");
  document.getElementById("searchInput").value = value;
  onSearch(value);
}

function toggleSearchBar() {
  var wrap = document.getElementById("searchWrap");
  var btn = document.getElementById("searchToggle");
  var isOpen = wrap.classList.toggle("is-open");
  btn.classList.toggle("is-active", isOpen);
  if (isOpen) document.getElementById("searchInput").focus();
  else { clearSearch(); }
}

var searchDebounceTimer = null;
function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById("searchClear").style.display = searchQuery ? "flex" : "none";
  shouldScrollToLive = false;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(render, 120);
}
function clearSearch() {
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  render();
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "share-toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 1500);
}

function localDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function setDay(d) {
  currentDay = d;
  shouldScrollToLive = true;
  document.querySelectorAll(".day-tab").forEach(function(b) { b.classList.toggle("active", parseInt(b.dataset.day,10)===d); });
  render();
}

function setFilter(f) {
  currentFilter = f;
  shouldScrollToLive = false;
  document.querySelectorAll(".filter-pill:not(.fav)").forEach(function(b) { b.classList.toggle("active", b.dataset.filter===f); });
  render();
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  shouldScrollToLive = false;
  document.querySelector(".filter-pill.fav").classList.toggle("active", showFavsOnly);
  render();
}

function toggleFav(id, e) {
  if (e) e.stopPropagation();
  favs[id] = !favs[id];
  if (!favs[id]) delete favs[id];
  saveFavs();
  render();
}

function toggleExpand(id) {
  expandedIds[id] = !expandedIds[id];
  render();
}

function render() {
  const now = new Date();
  const dayDate = DAY_DATES[currentDay];
  const isToday = localDateStr(now) === dayDate;
  const nowMin = now.getHours()*60+now.getMinutes();

  const currentIds = new Set();
  const nextIds = new Set();

  if (isToday) {
    const ds = S.filter(function(s) { return s.day===currentDay && s.type!=="break"; });
    for (let i = 0; i < ds.length; i++) {
      const s = ds[i];
      if (nowMin>=timeToMin(s.time) && nowMin<timeToMin(s.end)) currentIds.add(s.id);
    }
    if (!currentIds.size) {
      let nextTime = null;
      for (let i = 0; i < ds.length; i++) {
        let t = timeToMin(ds[i].time);
        if (t > nowMin) {
          if (nextTime === null) nextTime = t;
          if (t === nextTime) nextIds.add(ds[i].id);
          else break;
        }
      }
    }
  }

  // Render Now & Next section
  var nnEl = document.getElementById("nowNext");
  var nnHtml = '';
  if (isToday && !searchQuery) {
    var currentSessions = S.filter(function(s) { return currentIds.has(s.id); });
    // Find next sessions
    var nextSessions = [];
    if (!currentIds.size) {
      nextSessions = S.filter(function(s) { return nextIds.has(s.id); });
    } else {
      // Find what comes after current
      var curEnd = 0;
      currentSessions.forEach(function(s) { var e = timeToMin(s.end); if (e > curEnd) curEnd = e; });
      var nextT = null;
      var ds = S.filter(function(s) { return s.day===currentDay && s.type!=="break"; });
      for (var ni = 0; ni < ds.length; ni++) {
        var t = timeToMin(ds[ni].time);
        if (t >= curEnd) {
          if (nextT === null) nextT = t;
          if (t === nextT) nextSessions.push(ds[ni]);
          else break;
        }
      }
    }

    for (var ci = 0; ci < currentSessions.length; ci++) {
      var cs = currentSessions[ci];
      nnHtml += '<div class="now-next-card"><div class="now-next-label">Jetzt</div>';
      nnHtml += '<div class="now-next-title">' + esc(cs.title) + '</div>';
      nnHtml += '<div class="now-next-meta">' + esc(cs.time) + '–' + esc(cs.end) + (cs.room ? ' · <span class="now-next-room">' + esc(cs.room) + '</span>' : '') + '</div></div>';
    }
    for (var nxi = 0; nxi < nextSessions.length; nxi++) {
      var ns = nextSessions[nxi];
      nnHtml += '<div class="now-next-card is-next-card"><div class="now-next-label">Als Nächstes</div>';
      nnHtml += '<div class="now-next-title">' + esc(ns.title) + '</div>';
      nnHtml += '<div class="now-next-meta">' + esc(ns.time) + '–' + esc(ns.end) + (ns.room ? ' · <span class="now-next-room">' + esc(ns.room) + '</span>' : '') + '</div></div>';
    }
  }
  nnEl.innerHTML = nnHtml;

  const isSearching = searchQuery.length > 0;

  const filtered = S.filter(function(s) {
    if (s.day !== currentDay) return false;
    if (showFavsOnly && !isSearching && !favs[s.id]) return false;
    if (!isSearching) {
      if (currentFilter==="main" && (s.type==="deep-dive")) return false;
      if (currentFilter==="deep-dive" && s.type!=="deep-dive") return false;
      // Hide breaks when filtering by track (only show in "all" view)
      if (currentFilter!=="all" && s.type==="break") return false;
    }
    if (isSearching) {
      const hay = (s.title + " " + s.speakers.join(" ") + " " + s.room + " " + s.desc).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  const groups = [];
  let lastT = null;
  for (let i = 0; i < filtered.length; i++) {
    const s = filtered[i];
    if (s.time !== lastT) { groups.push({time:s.time,sessions:[s]}); lastT=s.time; }
    else groups[groups.length-1].sessions.push(s);
  }

  const tl = document.getElementById("timeline");
  if (!groups.length) {
    var emptyMsg;
    if (isSearching) {
      emptyMsg = 'Keine Treffer f\u00fcr \u201E'+esc(searchQuery)+'\u201C';
    } else if (showFavsOnly) {
      var hasFavs = Object.keys(favs).length > 0;
      if (hasFavs) {
        emptyMsg = 'Keine Favoriten f\u00fcr diesen Tag.<br><span style="font-size:12px;opacity:0.6">Deine Favoriten sind auf dem anderen Tag.</span>';
      } else {
        emptyMsg = 'Du hast noch keine Favoriten gespeichert.<br><span style="font-size:12px;opacity:0.6">Tippe auf \u2606 neben einer Session, um sie zu merken.</span><br><br><button type="button" onclick="toggleFavFilter()" style="background:var(--pill-active-bg);color:var(--pill-active-color);border:none;padding:8px 16px;border-radius:20px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer">Alle Sessions anzeigen</button>';
      }
    } else {
      emptyMsg = 'Keine Sessions gefunden.';
    }
    tl.innerHTML = '<div class="empty">'+emptyMsg+'</div>';
    return;
  }

  let html = '';
  // Show active filter hint when favorites are active
  if (showFavsOnly && !isSearching) {
    var favCount = filtered.filter(function(s) { return s.type !== "break"; }).length;
    html += '<div style="text-align:center;padding:6px 0 2px;font-size:11px;color:var(--gold);font-weight:600;opacity:0.7">\u2605 '+favCount+' Favorit'+(favCount!==1?'en':'')+' \u00b7 <span onclick="toggleFavFilter()" style="text-decoration:underline;cursor:pointer">Filter aufheben</span></div>';
  }
  let scrollTargetAssigned = false;

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    html += '<div class="time-marker" role="presentation"><div class="time-label">'+esc(g.time)+'</div><div class="time-line"></div></div>';

    for (let si = 0; si < g.sessions.length; si++) {
      const s = g.sessions[si];
      const isCur = currentIds.has(s.id);
      const isNxt = nextIds.has(s.id);
      const isExp = expandedIds[s.id];
      const isFav = favs[s.id];
      const isBrk = s.type==="break";
      const hasDesc = !isBrk && s.desc;

      let cls = "session";
      if (isBrk) cls += " is-break";
      if (hasDesc) cls += " is-expandable";
      if (isCur) cls += " is-current";
      if (isNxt) cls += " is-next";

      let needsScroll = !scrollTargetAssigned && (isCur || isNxt);
      if (needsScroll) scrollTargetAssigned = true;
      let scrollAttr = needsScroll ? ' id="scroll-target"' : '';

      html += '<div class="'+cls+'" role="listitem" data-sid="'+esc(s.id)+'"'+scrollAttr+(hasDesc?' tabindex="0" aria-expanded="'+(isExp?'true':'false')+'"':'')+'>';

      // Top row
      html += '<div class="session-top">';
      if (isCur) html += '<span class="badge badge-now">JETZT \u00b7 bis '+esc(s.end)+'</span>';
      if (isNxt) html += '<span class="badge badge-next">Als N\u00e4chstes</span>';

      if (isBrk) html += '<span class="badge badge-break">Pause</span>';
      else if (s.type==="deep-dive") html += '<span class="badge badge-deep">Deep Dive</span>';
      else html += '<span class="badge badge-main">Main Stage</span>';

      // Only show room tag if it adds information (not redundant with badge)
      if (s.room && !isBrk && s.room !== "Mainstage") html += '<span class="room-tag">\ud83d\udccd '+esc(s.room)+'</span>';
      if (!isBrk) html += '<button type="button" class="fav-btn'+(isFav?' is-fav':'')+'" aria-label="'+(isFav?'Favorit entfernen':'Als Favorit markieren')+'">'+(isFav?'\u2605':'\u2606')+'</button>';
      html += '</div>';

      // Title
      if (isBrk) {
        html += '<div class="session-title">'+esc(s.time)+' \u2013 '+esc(s.end)+' \u00b7 '+esc(s.title)+'</div>';
      } else {
        html += '<div class="session-title">'+esc(s.title)+'<span class="session-time-inline">'+esc(s.time)+'\u2013'+esc(s.end)+'</span></div>';
      }

      // Speakers (formatted: name bold, company as pill)
      if (s.speakers.length) {
        var compact = s.speakers.length >= 3;
        html += '<div class="session-speakers">'+s.speakers.map(function(sp) { return '<span class="speaker-line">'+formatSpeakerHtml(sp, compact)+'</span>'; }).join('')+'</div>';
      }

      // Description
      if (isExp && s.desc) {
        html += '<div class="session-desc">'+esc(s.desc)+'</div>';
      }

      // Expand/collapse hint
      if (hasDesc && !isExp) {
        html += '<div class="expand-hint">\u25be Details anzeigen</div>';
      } else if (hasDesc && isExp) {
        html += '<div class="expand-hint">\u25b4 Weniger anzeigen</div>';
      }

      html += '</div>';
    }
  }

  tl.innerHTML = html;

  // Scroll to current/next only on initial load or day switch
  if (shouldScrollToLive) {
    const target = document.getElementById("scroll-target");
    if (target) setTimeout(function() { target.scrollIntoView({behavior:"smooth",block:"center"}); }, 300);
    shouldScrollToLive = false;
  }
}

// Event delegation for timeline interactions (prevents XSS via inline handlers)
document.getElementById("timeline").addEventListener("click", function(e) {
  var card = e.target.closest("[data-sid]");
  if (!card) return;
  var id = card.dataset.sid;
  if (e.target.closest(".fav-btn")) { toggleFav(id, e); return; }
  var s = S.find(function(x) { return x.id === id; });
  if (s && s.type !== "break" && s.desc) toggleExpand(id);
});
document.getElementById("timeline").addEventListener("keydown", function(e) {
  if (e.key !== "Enter" && e.key !== " ") return;
  var card = e.target.closest("[data-sid]");
  if (!card) return;
  var id = card.dataset.sid;
  var s = S.find(function(x) { return x.id === id; });
  if (s && s.type !== "break" && s.desc) { e.preventDefault(); toggleExpand(id); }
});

// Auto-detect correct day
(function autoDetectDay() {
  const today = localDateStr(new Date());
  if (today === DAY_DATES[2]) setDay(2);
  else setDay(1);
})();

// Theme: light <-> dark (separate toggle)
// Synthwave: overlay on top of light/dark (separate button)
var baseTheme = "light"; // "light" or "dark"
var synthwaveOn = false;
var THEME_COLORS = {light: "#f5f5f7", dark: "#0e0e12", retro: "#1a1028"};

function applyTheme(theme) {
  if (theme === "light") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("metaThemeColor").setAttribute("content", THEME_COLORS[theme] || THEME_COLORS.light);
  try { localStorage.setItem("wuv26_theme", theme); } catch(e) {}
}

function updateThemeUI() {
  var effective = synthwaveOn ? "retro" : baseTheme;
  applyTheme(effective);
  // Stop music when leaving retro
  if (effective !== "retro" && synthPlaying) toggleMusic();
  // Light/dark toggle icon: show opposite
  document.getElementById("themeToggle").textContent = baseTheme === "light" ? "\uD83C\uDF19" : "\u2600\uFE0F";
  // Synthwave button glow
  var synthBtn = document.getElementById("synthToggle");
  synthBtn.classList.toggle("is-active", synthwaveOn);
}

function toggleTheme() {
  // If synthwave is on, turn it off first and go to the toggled base theme
  if (synthwaveOn) {
    synthwaveOn = false;
    try { localStorage.setItem("wuv26_synth", "0"); } catch(e) {}
  }
  baseTheme = baseTheme === "light" ? "dark" : "light";
  try { localStorage.setItem("wuv26_base", baseTheme); } catch(e) {}
  updateThemeUI();
}

function toggleSynthwave() {
  synthwaveOn = !synthwaveOn;
  try { localStorage.setItem("wuv26_synth", synthwaveOn ? "1" : "0"); } catch(e) {}
  updateThemeUI();
}

(function initTheme() {
  try { baseTheme = localStorage.getItem("wuv26_base") || "light"; } catch(e) {}
  if (baseTheme !== "light" && baseTheme !== "dark") baseTheme = "light";
  try { synthwaveOn = localStorage.getItem("wuv26_synth") === "1"; } catch(e) {}
  // Migrate old theme storage
  try {
    var old = localStorage.getItem("wuv26_theme");
    if (old === "retro") { synthwaveOn = true; baseTheme = "dark"; localStorage.removeItem("wuv26_theme"); localStorage.setItem("wuv26_base", baseTheme); localStorage.setItem("wuv26_synth", "1"); }
    else if (old === "dark") { baseTheme = "dark"; localStorage.removeItem("wuv26_theme"); localStorage.setItem("wuv26_base", "dark"); }
  } catch(e) {}
  updateThemeUI();
})();

// === SYNTHWAVE STARS ===
(function initStars() {
  var canvas = document.getElementById("retroStars");
  if (!canvas) return;
  var stars = [];
  for (var i = 0; i < 60; i++) {
    var star = document.createElement("div");
    star.style.cssText = "position:absolute;width:" + (1 + Math.random() * 2) + "px;height:" + (1 + Math.random() * 2) + "px;" +
      "background:" + (Math.random() > 0.5 ? "#fff" : (Math.random() > 0.5 ? "#d554d5" : "#ff6b35")) + ";" +
      "border-radius:50%;opacity:" + (0.1 + Math.random() * 0.5) + ";" +
      "left:" + (Math.random() * 100) + "%;top:" + (Math.random() * 100) + "%;" +
      "animation:starTwinkle " + (2 + Math.random() * 4) + "s ease-in-out infinite " + (Math.random() * 3) + "s;";
    canvas.appendChild(star);
  }
})();

// === EASTER EGG: SHAKE TO ACTIVATE (mobile) + KONAMI CODE (desktop) ===
(function initEasterEgg() {
  function toggleEasterEgg() {
    document.documentElement.classList.toggle("easter-active");
    var isActive = document.documentElement.classList.contains("easter-active");
    if (isActive) {
      showToast("🌈 EASTER EGG! Tippe 🔇 für Musik");
      // Auto-enable synthwave if not already on
      if (!synthwaveOn) toggleSynthwave();
    } else {
      showToast("Easter egg deactivated");
    }
  }

  // Shake detection for mobile
  var shakeThreshold = 25;
  var lastX = null, lastY = null, lastZ = null;
  var shakeCount = 0;
  var shakeTimer = null;

  function onMotion(e) {
    var acc = e.accelerationIncludingGravity;
    if (!acc || acc.x === null) return;
    if (lastX !== null) {
      var dx = Math.abs(acc.x - lastX);
      var dy = Math.abs(acc.y - lastY);
      var dz = Math.abs(acc.z - lastZ);
      if (dx + dy + dz > shakeThreshold) {
        shakeCount++;
        if (shakeCount >= 3) {
          shakeCount = 0;
          toggleEasterEgg();
        }
        clearTimeout(shakeTimer);
        shakeTimer = setTimeout(function() { shakeCount = 0; }, 1000);
      }
    }
    lastX = acc.x; lastY = acc.y; lastZ = acc.z;
  }

  if (window.DeviceMotionEvent) {
    // iOS 13+ requires permission
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      // Will be requested on first user interaction
      document.addEventListener("click", function reqPerm() {
        DeviceMotionEvent.requestPermission().then(function(state) {
          if (state === "granted") window.addEventListener("devicemotion", onMotion);
        }).catch(function() {});
        document.removeEventListener("click", reqPerm);
      }, { once: true });
    } else {
      window.addEventListener("devicemotion", onMotion);
    }
  }

  // Konami code for desktop
  var code = [38,38,40,40,37,39,37,39,66,65];
  var pos = 0;
  document.addEventListener("keydown", function(e) {
    if (e.keyCode === code[pos]) {
      pos++;
      if (pos === code.length) { pos = 0; toggleEasterEgg(); }
    } else { pos = 0; }
  });
})();

// === SYNTHWAVE MUSIC (MP3) ===
// Audio element created eagerly so it's ready when user taps play.
// On iOS/Safari, play() must happen in a direct user gesture (click/touchend).
// The onclick="toggleMusic()" on the button IS a direct user gesture.
var synthAudio = new Audio("music01.mp3");
synthAudio.loop = true;
synthAudio.volume = 0.4;
synthAudio.preload = "auto";
var synthPlaying = false;

function toggleMusic() {
  var btn = document.getElementById("musicToggle");
  if (!synthPlaying) {
    // Direct user gesture → play() is allowed by browser
    synthAudio.play().then(function() {
      synthPlaying = true;
      btn.textContent = "\uD83D\uDD0A";
      btn.classList.add("playing");
    }).catch(function(err) {
      synthPlaying = false;
      btn.textContent = "\uD83D\uDD07";
      btn.classList.remove("playing");
      showToast("Audio konnte nicht gestartet werden");
    });
  } else {
    synthPlaying = false;
    synthAudio.pause();
    btn.textContent = "\uD83D\uDD07";
    btn.classList.remove("playing");
  }
}

// === JUMP TO NOW BUTTON ===
function jumpToNow() {
  var target = document.getElementById("scroll-target");
  if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
  document.getElementById("jumpNow").classList.remove("is-visible");
}

// Show/hide jump-to-now based on scroll position
(function initJumpButton() {
  var jumpBtn = document.getElementById("jumpNow");
  var lastScroll = 0;
  window.addEventListener("scroll", function() {
    var target = document.getElementById("scroll-target");
    if (!target) { jumpBtn.classList.remove("is-visible"); return; }
    var rect = target.getBoundingClientRect();
    // Show button if current session is above or below viewport
    var offScreen = rect.bottom < 0 || rect.top > window.innerHeight;
    jumpBtn.classList.toggle("is-visible", offScreen);
  }, { passive: true });
})();

// === OFFLINE INDICATOR ===
(function initOfflineIndicator() {
  var banner = document.getElementById("offlineBanner");
  function update() { banner.classList.toggle("is-visible", !navigator.onLine); }
  window.addEventListener("online", update);
  window.addEventListener("offline", update);
  update();
})();

// Register service worker for offline support
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function() {});
}

// Refresh every 30s for live tracking, pause when tab is hidden
let refreshInterval = setInterval(render, 30000);
document.addEventListener("visibilitychange", function() {
  clearInterval(refreshInterval);
  if (!document.hidden) {
    render();
    refreshInterval = setInterval(render, 30000);
  }
});
</script>
