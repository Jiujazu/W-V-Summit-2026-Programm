/* Search */
.search-wrap {
  position: relative; margin-top: 8px;

.search-input {
  width: 100%; padding: 9px 36px 9px 14px;

  outline: none; transition: border-color .15s;
}
.search-input::placeholder { color: var(--search-placeholder); }
.search-input:focus { border-color: var(--text-dim); }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: var(--search-clear-bg); border: none; color: var(--search-clear-color);
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  font-size: 11px; display: flex; align-items: center; justify-content: center;

  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 2px 0; line-height: 1;
  color: var(--share-color); transition: color .15s;
  margin-left: auto;
}
.share-btn:active { color: var(--teal); }
.share-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--teal); color: #000; padding: 8px 18px;
  border-radius: 20px; font-size: 12px; font-weight: 700;
  z-index: 1000; animation: fadeIn .2s ease;
  pointer-events: none;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg) 92%, transparent);
  padding: calc(var(--safe-top) + 14px) 16px 12px;
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
.header-title { font-size: 18px; font-weight: 800; line-height: 1.2; }
.header-meta { font-size: 11px; color: var(--text-dim); text-align: right; line-height: 1.4; }

.day-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.day-tab {
  flex: 1; padding: 10px 0; border: none; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
  background: var(--tab-bg); color: var(--tab-color);
  transition: all .2s;
}
.day-tab.active { background: var(--accent); color: #fff; }

.filter-pill {
  padding: 6px 12px; border: none; border-radius: 20px; cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 600;
  background: var(--pill-bg); color: var(--pill-color);
  transition: all .15s;
}
.filter-pill.active { background: var(--pill-active-bg); color: var(--pill-active-color); }
.filter-pill.fav { margin-left: auto; }
.filter-pill.fav.active { background: var(--fav-active-bg); color: var(--gold); }

button:focus-visible, .search-input:focus-visible {

  transition: all .2s;

.session.is-expandable { cursor: pointer; }
.session.is-break { background: var(--card-break); }
.session.is-current {
  background: var(--current-bg);
  border-color: var(--current-border);
}
.session.is-next { border-color: var(--next-border); }

.session-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }

.footer a.secondary { color: var(--footer-secondary); }

.theme-toggle {

  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;

// State
let currentDay = 1;
let currentFilter = "all";
let showFavsOnly = false;
let expandedIds = {};
let favs = {};
let searchQuery = "";
let shouldScrollToLive = true;

// localStorage
function loadFavs() {
  try { favs = JSON.parse(localStorage.getItem("wuv26_favs")) || {}; } catch(e) { favs = {}; }
}
function saveFavs() {
  try { localStorage.setItem("wuv26_favs", JSON.stringify(favs)); } catch(e) {}
}
loadFavs();

const DAY_DATES = {1: "2026-03-11", 2: "2026-03-12"};

function timeToMin(t) { const p = t.split(":"); return parseInt(p[0],10)*60+parseInt(p[1],10); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById("searchClear").style.display = searchQuery ? "flex" : "none";
  shouldScrollToLive = false;
  render();
}
function clearSearch() {
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  render();
}

function shareSession(id, e) {
  if (e) e.stopPropagation();
  const s = S.find(function(x) { return x.id === id; });
  if (!s) return;
  const day = s.day === 1 ? "Mi 11.03." : "Do 12.03.";
  const text = s.title + "\n" + day + " " + s.time + "–" + s.end + (s.room ? " | " + s.room : "") + "\n" + (s.speakers.length ? s.speakers.join(", ") : "") + "\n\n#WuVSummit";

  if (navigator.share) {
    navigator.share({ title: s.title, text: text }).catch(function() {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast("Kopiert!"); }).catch(function() { showToast("Kopieren fehlgeschlagen"); });
  } else {
    showToast("Teilen nicht unterst\u00fctzt");
  }
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "share-toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 1500);
}

function localDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function setDay(d) {
  currentDay = d;
  shouldScrollToLive = true;
  document.querySelectorAll(".day-tab").forEach(function(b) { b.classList.toggle("active", parseInt(b.dataset.day,10)===d); });
  render();
}

function setFilter(f) {
  currentFilter = f;
  shouldScrollToLive = false;
  document.querySelectorAll(".filter-pill:not(.fav)").forEach(function(b) { b.classList.toggle("active", b.dataset.filter===f); });
  render();
}

function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  shouldScrollToLive = false;
  document.querySelector(".filter-pill.fav").classList.toggle("active", showFavsOnly);
  render();
}

function toggleFav(id, e) {
  if (e) e.stopPropagation();
  favs[id] = !favs[id];
  if (!favs[id]) delete favs[id];
  saveFavs();
  render();
}

function toggleExpand(id) {
  expandedIds[id] = !expandedIds[id];
  render();
}

function render() {
  const now = new Date();
  const dayDate = DAY_DATES[currentDay];
  const isToday = localDateStr(now) === dayDate;
  const nowMin = now.getHours()*60+now.getMinutes();

  const currentIds = new Set();
  const nextIds = new Set();

  if (isToday) {
    const ds = S.filter(function(s) { return s.day===currentDay && s.type!=="break"; });
    for (let i = 0; i < ds.length; i++) {
      const s = ds[i];
      if (nowMin>=timeToMin(s.time) && nowMin<timeToMin(s.end)) currentIds.add(s.id);
    }
    if (!currentIds.size) {
      let nextTime = null;
      for (let i = 0; i < ds.length; i++) {
        var t = timeToMin(ds[i].time);
        if (t > nowMin) {
          if (nextTime === null) nextTime = t;
          if (t === nextTime) nextIds.add(ds[i].id);
          else break;
        }
      }
    }
  }

  const isSearching = searchQuery.length > 0;

  const filtered = S.filter(function(s) {
    if (s.day !== currentDay) return false;
    if (showFavsOnly && !isSearching && !favs[s.id]) return false;
    if (!isSearching) {
      if (currentFilter==="main" && s.type==="deep-dive") return false;
      if (currentFilter==="deep-dive" && s.type!=="deep-dive") return false;
    }
    if (isSearching) {
      const hay = (s.title + " " + s.speakers.join(" ") + " " + s.room + " " + s.desc).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  const groups = [];
  let lastT = null;
  for (let i = 0; i < filtered.length; i++) {
    const s = filtered[i];
    if (s.time !== lastT) { groups.push({time:s.time,sessions:[s]}); lastT=s.time; }
    else groups[groups.length-1].sessions.push(s);
  }

  const tl = document.getElementById("timeline");
  if (!groups.length) {
    tl.innerHTML = '<div class="empty">'+(isSearching?'Keine Treffer für \u201E'+esc(searchQuery)+'\u201C':showFavsOnly?'Keine Favoriten für diesen Tag.':'Keine Sessions gefunden.')+'</div>';
    return;
  }

  let html = '';
  let scrollTargetAssigned = false;

  for (let gi = 0; gi < groups.length; gi++) {
    const g = groups[gi];
    html += '<div class="time-marker"><div class="time-label">'+esc(g.time)+'</div><div class="time-line"></div></div>';

    for (let si = 0; si < g.sessions.length; si++) {
      const s = g.sessions[si];
      const isCur = currentIds.has(s.id);
      const isNxt = nextIds.has(s.id);
      const isExp = expandedIds[s.id];
      const isFav = favs[s.id];
      const isBrk = s.type==="break";
      const hasDesc = !isBrk && s.desc;

      let cls = "session";
      if (isBrk) cls += " is-break";
      if (hasDesc) cls += " is-expandable";
      if (isCur) cls += " is-current";
      if (isNxt) cls += " is-next";

      var needsScroll = !scrollTargetAssigned && (isCur || isNxt);
      if (needsScroll) scrollTargetAssigned = true;
      var scrollAttr = needsScroll ? ' id="scroll-target"' : '';

      html += '<div class="'+cls+'" role="listitem" data-sid="'+esc(s.id)+'"'+scrollAttr+(hasDesc?' tabindex="0"':'')+'>';

      // Top row
      html += '<div class="session-top">';
      if (isCur) html += '<span class="badge badge-now">JETZT</span>';
      if (isNxt) html += '<span class="badge badge-next">Als N\u00e4chstes</span>';

      if (isBrk) html += '<span class="badge badge-break">Pause</span>';
      else if (s.type==="deep-dive") html += '<span class="badge badge-deep">Deep Dive</span>';
      else html += '<span class="badge badge-main">Main Stage</span>';

      if (s.room && !isBrk) html += '<span class="room-tag">\ud83d\udccd '+esc(s.room)+'</span>';
      if (!isBrk) html += '<button type="button" class="share-btn" aria-label="Session teilen">\u{1F4E4}</button><button type="button" class="fav-btn'+(isFav?' is-fav':'')+'" aria-label="'+(isFav?'Favorit entfernen':'Als Favorit markieren')+'">'+(isFav?'\u2605':'\u2606')+'</button>';
      html += '</div>';

      // Title
      if (isBrk) {
        html += '<div class="session-title">'+esc(s.time)+' \u2013 '+esc(s.end)+' \u00b7 '+esc(s.title)+'</div>';
      } else {
        html += '<div class="session-title">'+esc(s.title)+'<span class="session-time-inline">'+esc(s.time)+'\u2013'+esc(s.end)+'</span></div>';
      }

      // Speakers
      if (s.speakers.length) {
        html += '<div class="session-speakers">'+s.speakers.map(esc).join(' \u00b7 ')+'</div>';
      }

      // Description
      if (isExp && s.desc) {
        html += '<div class="session-desc">'+esc(s.desc)+'</div>';
      }

      // Expand hint
      if (hasDesc && !isExp) {
        html += '<div class="expand-hint">\u25be Details antippen</div>';
      }

      html += '</div>';
    }
  }

  tl.innerHTML = html;

  // Scroll to current/next only on initial load or day switch
  if (shouldScrollToLive) {
    const target = document.getElementById("scroll-target");
    if (target) setTimeout(function() { target.scrollIntoView({behavior:"smooth",block:"center"}); }, 300);
    shouldScrollToLive = false;
  }
}

// Event delegation for timeline interactions (prevents XSS via inline handlers)
document.getElementById("timeline").addEventListener("click", function(e) {
  var card = e.target.closest("[data-sid]");
  if (!card) return;
  var id = card.dataset.sid;
  if (e.target.closest(".fav-btn")) { toggleFav(id, e); return; }
  if (e.target.closest(".share-btn")) { shareSession(id, e); return; }
  var s = S.find(function(x) { return x.id === id; });
  if (s && s.type !== "break" && s.desc) toggleExpand(id);
});
document.getElementById("timeline").addEventListener("keydown", function(e) {
  if (e.key !== "Enter" && e.key !== " ") return;
  var card = e.target.closest("[data-sid]");
  if (!card) return;
  var id = card.dataset.sid;
  var s = S.find(function(x) { return x.id === id; });
  if (s && s.type !== "break" && s.desc) { e.preventDefault(); toggleExpand(id); }
});

// Auto-detect correct day
(function autoDetectDay() {
  const today = localDateStr(new Date());
  if (today === DAY_DATES[2]) setDay(2);
  else setDay(1);
})();

// Theme toggle
function toggleTheme() {
  var isDark = document.documentElement.getAttribute("data-theme") === "dark";
  var newTheme = isDark ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", newTheme === "dark" ? "dark" : "");
  if (newTheme === "light") document.documentElement.removeAttribute("data-theme");
  document.getElementById("themeToggle").textContent = newTheme === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
  document.getElementById("metaThemeColor").setAttribute("content", newTheme === "dark" ? "#0e0e12" : "#f5f5f7");
  try { localStorage.setItem("wuv26_theme", newTheme); } catch(e) {}
}
(function initTheme() {
  var saved = null;
  try { saved = localStorage.getItem("wuv26_theme"); } catch(e) {}
  if (saved === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
    document.getElementById("themeToggle").textContent = "\u2600\uFE0F";
    document.getElementById("metaThemeColor").setAttribute("content", "#0e0e12");
  } else {
    document.getElementById("themeToggle").textContent = "\uD83C\uDF19";
  }
})();

// Refresh every 30s for live tracking, pause when tab is hidden
let refreshInterval = setInterval(render, 30000);
document.addEventListener("visibilitychange", function() {
  clearInterval(refreshInterval);
  if (!document.hidden) {
    shouldScrollToLive = true;
    render();
    refreshInterval = setInterval(render, 30000);
  }
});
</script>
