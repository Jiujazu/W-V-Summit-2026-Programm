name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          test -f og-image.jpg && cp og-image.jpg _site/ || true
          test -f music01.mp3 && cp music01.mp3 _site/ || true
          test -f nyan-cat.gif && cp nyan-cat.gif _site/ || true
          test -f sw.js && cp sw.js _site/ || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
